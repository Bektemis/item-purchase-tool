<template>
    <section
        class="slds-modal slds-fade-in-open slds-modal_medium"
        role="dialog"
        tabindex="-1"
    >
        <div class="slds-modal__container">
            <header class="slds-modal__header">
                <lightning-button-icon
                    icon-name="utility:close"
                    onclick={closeModal}
                    class="slds-modal__close"
                    variant="bare-inverse"
                ></lightning-button-icon>
                <h2 class="slds-text-heading_medium">Create New Item</h2>
            </header>

            <div class="slds-modal__content slds-p-around_medium">
                <lightning-record-edit-form
                    object-api-name="Item__c"
                    onsuccess={handleSuccess}
                    onerror={handleError}
                >
                    <lightning-messages></lightning-messages>
                    <lightning-input-field field-name="Name"></lightning-input-field>
                    <lightning-input-field field-name="Description__c"></lightning-input-field>
                    <lightning-input-field field-name="Type__c"></lightning-input-field>
                    <lightning-input-field field-name="Family__c"></lightning-input-field>
                    <lightning-input-field field-name="Image__c"></lightning-input-field>
                    <lightning-input-field field-name="Price__c"></lightning-input-field>
                    <lightning-input-field field-name="Available_Quantity__c"></lightning-input-field>

                    <div class="slds-var-m-top_medium">
                        <lightning-button label="Cancel" onclick={closeModal}></lightning-button>
                        <lightning-button
                            type="submit"
                            label="Save"
                            variant="brand"
                            class="slds-var-m-left_small"
                        ></lightning-button>
                    </div>
                </lightning-record-edit-form>
            </div>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
