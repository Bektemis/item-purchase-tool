<template>
    <section
        class="slds-modal slds-fade-in-open slds-modal_medium"
        role="dialog"
        tabindex="-1"
    >
        <div class="slds-modal__container">
            <header class="slds-modal__header">
                <lightning-button-icon
                    icon-name="utility:close"
                    onclick={closeModal}
                    class="slds-modal__close"
                    variant="bare-inverse"
                ></lightning-button-icon>
                <h2 class="slds-text-heading_medium">Your Cart</h2>
            </header>

            <div class="slds-modal__content slds-p-around_medium">
                <template if:false={hasItems}>
                    <p>Your cart is empty.</p>
                </template>

                <template if:true={hasItems}>
                    <table class="slds-table slds-table_bordered">
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Quantity</th>
                                <th>Unit Price</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={cartItems} for:item="ci">
                                <tr key={ci.Id}>
                                    <td>{ci.Name}</td>
                                    <td>{ci.quantity}</td>
                                    <td>
                                        <lightning-formatted-number
                                            value={ci.Price__c}
                                            format-style="currency"
                                            currency-code="USD"
                                        ></lightning-formatted-number>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>

                    <p class="slds-var-m-top_medium slds-text-heading_small">
                        Total:
                        <lightning-formatted-number
                            value={cartTotal}
                            format-style="currency"
                            currency-code="USD"
                        ></lightning-formatted-number>
                    </p>
                </template>
            </div>

            <footer class="slds-modal__footer">
                <lightning-button label="Close" onclick={closeModal}></lightning-button>
                <lightning-button
                    label="Checkout"
                    variant="brand"
                    onclick={handleCheckout}
                    disabled={isProcessing}
                    class="slds-var-m-left_small"
                ></lightning-button>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
