<template>
    <section
        class="slds-modal slds-fade-in-open slds-modal_medium"
        role="dialog"
        tabindex="-1"
    >
        <div class="slds-modal__container">
            <header class="slds-modal__header">
                <lightning-button-icon
                    icon-name="utility:close"
                    onclick={closeModal}
                    class="slds-modal__close"
                    variant="bare-inverse"
                ></lightning-button-icon>
                <h2 class="slds-text-heading_medium">{item.Name}</h2>
            </header>

            <div class="slds-modal__content slds-p-around_medium">
                <template if:true={item.Image__c}>
                    <img src={item.Image__c} alt={item.Name} class="detail-image" />
                </template>

                <p class="slds-var-m-top_small">
                    <strong>Description:</strong> {item.Description__c}
                </p>
                <p><strong>Type:</strong> {item.Type__c}</p>
                <p><strong>Family:</strong> {item.Family__c}</p>
                <p>
                    <strong>Price:</strong>
                    <lightning-formatted-number
                        value={item.Price__c}
                        format-style="currency"
                        currency-code="USD"
                    ></lightning-formatted-number>
                </p>
                <p><strong>Available Quantity:</strong> {item.Available_Quantity__c}</p>
            </div>

            <footer class="slds-modal__footer">
                <lightning-button label="Close" onclick={closeModal}></lightning-button>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
